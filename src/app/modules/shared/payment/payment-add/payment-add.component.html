<app-header [headerModel]="headerModel"></app-header>

<ion-content>
  <form *ngIf="form" [formGroup]="form">
    <ion-grid>
      <ion-row>
        <ion-col size-sm="6" offset-sm="3">
          <ion-item>
            <ion-label position="floating">Paid Amount<span class="required-field"></span></ion-label>
            <ion-input type="number" formControlName="amount" #amountPaidCtrl></ion-input>
          </ion-item>
          <ion-item *ngIf="form.get('amount').invalid && (form.get('amount').dirty || form.get('amount').touched)"
            lines="none">
            <ion-label *ngIf="form.get('amount').errors.required" color="danger">Enter the Amount Paid</ion-label>
            <ion-label *ngIf="form.get('amount').errors.min" color="danger">Mininum should be greater than one
            </ion-label>
          </ion-item>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col size-sm="6" offset-sm="3">
          <ion-item *ngIf="amountPaidCtrl.value>0">
            <ion-label position="floating">Payment Mode: <span class="required-field"></span></ion-label>
            <ion-select formControlName="paymentMode" interface="popover">
              <ion-select-option *ngFor="let pm of paymentModeArray | enumToArray" [value]="pm.key">
                {{pm.value}}
              </ion-select-option>
            </ion-select>
          </ion-item>
        </ion-col>
      </ion-row>


      <ion-row>
        <ion-col size-sm="6" offset-sm="3">
          <ion-item *ngIf="amountPaidCtrl.value>0">
            <ion-label position="floating">Payment Reference <span class="required-field"></span></ion-label>
            <ion-input type="text" formControlName="paymentReference"></ion-input>
          </ion-item>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col size-sm="6" offset-sm="3">
          <ion-item *ngIf="amountPaidCtrl.value>0">
            <ion-label position="floating">Payment Date <span class="required-field"></span></ion-label>
            <ion-datetime displayFormat="YYYY-MM-DD" formControlName="paymentDate"> </ion-datetime>
          </ion-item>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col size-sm="6" offset-sm="3">

          <ion-button color="primary" (click)="onSuccess()">Add Payment</ion-button>
          <ion-button color="danger" (click)="onCancel()">Cancel</ion-button>

        </ion-col>
      </ion-row>
    </ion-grid>
  </form>
</ion-content>
