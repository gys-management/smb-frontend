<form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm.value)">
  <ion-grid>
    <ion-row>
      <ion-col size-md="6" offset-md="3" class="ion-text-center">
        <div class="login-logo">
          <!-- <ion-icon style="font-size: xx-large;" name="lock-closed-outline"></ion-icon> -->
          <!-- <img src="../../../../assets/img/fotoJet.jpg" alt="Ionic logo"> -->

        </div>
        <!-- <ion-label style="font-size: x-large;" color="primary">Stock Management and Billing</ion-label> <br /> -->
        <br />
        <br />
        <ion-label style="font-size: large;" color="dark">Sign-in</ion-label>

      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size-md="6" offset-md="3">
        <ion-item>
          <ion-label position="floating" color="primary">UserId<span class="required-field"></span></ion-label>
          <ion-input type="text" (ngModel)="login.userName" name="userName" inputmode="decimal" #username="ngModel"
            spellcheck="false" autocapitalize="off" required>
          </ion-input>
        </ion-item>
        <ion-item *ngIf="username.invalid && (username.dirty || username.touched)" lines="none">
          <ion-label color="danger">Enter the User Id</ion-label>
        </ion-item>
        <!-- <ion-text color="danger">
          <p [hidden]="username.valid" class="ion-padding-start">
            Username is required
          </p>
        </ion-text> -->
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size-md="6" offset-md="3">
        <ion-item>
          <ion-label position="floating" color="primary">Password<span class="required-field"></span></ion-label>
          <ion-input (ngModel)="login.password" name="password" type="password" #password="ngModel" required>
          </ion-input>
        </ion-item>
        <ion-item *ngIf="password.invalid && (password.dirty || password.touched)" lines="none">
          <ion-label color="danger">Enter the Password</ion-label>
        </ion-item>
        <!-- <ion-text color="danger">
          <p [hidden]="password.valid" class="ion-padding-start">
            Password is required
          </p>
        </ion-text> -->
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col size-md="6" offset-md="3">
        <ion-button type="submit" color="light" [disabled]="loginForm.invalid" expand="block">
          <ion-icon color="primary" slot="start" name="checkmark-circle-outline"></ion-icon>
          <ion-label color="primary"> Login</ion-label>
        </ion-button>
      </ion-col>
    </ion-row>
    <!-- <ion-row>
      <ion-col size-md="6" offset-md="3" class="ion-text-center">
        <ion-label> OR </ion-label>
      </ion-col>
    </ion-row> -->
    <ion-row>
      <ion-col size-md="6" offset-md="3">
        <!-- <ion-button expand="block" color="light" (click)="onLoginGoogle()">
          <ion-icon color="danger" slot="start" name="logo-google"> </ion-icon>
          <ion-label color="danger"> Sign-In With Google</ion-label>
        </ion-button> -->

        <!-- <ion-button (click)="onLoginTwitter()">
            <ion-icon color="primary" slot="icon-only" name="logo-twitter"></ion-icon>

          </ion-button>
          <ion-button (click)="onLoginGithub()">
            <ion-icon color="dark" slot="icon-only" name="logo-github"></ion-icon>

          </ion-button> -->

      </ion-col>
    </ion-row>
    <!-- <ion-row>
      <ion-col size-md="6" offset-md="3">
        <ion-button expand="block" color="light" (click)="onSignup()">
          <ion-icon color="dark" slot="start" name="person-add-outline"> </ion-icon>
          <ion-label color="dark"> New to SMB? Create an account.</ion-label>
        </ion-button>

      </ion-col>
    </ion-row> -->
  </ion-grid>

</form>
