<ion-grid *ngIf="count">
  <ion-row>
    <ion-col size-lg="3" size-md="3" size-sm="6" size-xs="6" class="ion-text-center">
      <ion-card>
        <ion-card-subtitle>
          <ion-label class="ion-label-header">Orders</ion-label>
        </ion-card-subtitle>
        <ion-card-content>
          <ion-label class="ion-label-value" [countUp]="count.orderCounts">
          </ion-label>
        </ion-card-content>
      </ion-card>
    </ion-col>

    <ion-col size-lg="3" size-md="3" size-sm="6" size-xs="6" class="ion-text-center">
      <ion-card>
        <ion-card-subtitle>
          <ion-label class="ion-label-header">Products</ion-label>
        </ion-card-subtitle>
        <ion-card-content>
          <ion-label class="ion-label-value" [countUp]="count.productDetailCounts">
          </ion-label>
        </ion-card-content>
      </ion-card>
    </ion-col>

    <ion-col size-lg="3" size-md="3" size-sm="6" size-xs="6" class="ion-text-center">
      <ion-card>
        <ion-card-subtitle>
          <ion-label class="ion-label-header">Customer</ion-label>
        </ion-card-subtitle>
        <ion-card-content>
          <ion-label class="ion-label-value" [countUp]="count.customerCounts">
          </ion-label>
        </ion-card-content>
      </ion-card>
    </ion-col>

    <ion-col size-lg="3" size-md="3" size-sm="6" size-xs="6" class="ion-text-center">
      <ion-card>
        <ion-card-subtitle>
          <ion-label class="ion-label-header">Staffs</ion-label>
        </ion-card-subtitle>
        <ion-card-content>
          <ion-label class="ion-label-value" [countUp]="count.staffCounts">
          </ion-label>
        </ion-card-content>
      </ion-card>
    </ion-col>
  </ion-row>
</ion-grid>
