<app-header [headerModel]="headerModel"></app-header>


<ion-content>
  <form *ngIf="form" [formGroup]="form">
    <ion-grid>
      <ion-row>
        <ion-col size-sm="6" offset-sm="3">
          <ion-item>
            <ion-label position="floating">Name <span class="required-field"></span></ion-label>
            <ion-input type="text" autocomplete autocorreect formControlName="name"></ion-input>
          </ion-item>
          <ion-item lines="none"
            *ngIf="form.get('name').invalid && (form.get('name').touched || form.get('name').dirty) ">
            <ion-label color="danger">
              Enter the Name
            </ion-label>
          </ion-item>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col size-sm="6" offset-sm="3">
          <ion-item>
            <ion-label position="floating"> Description </ion-label>
            <ion-input type="text" autocomplete autocorreect formControlName="description"></ion-input>
          </ion-item>
          <ion-item lines="none"
            *ngIf="form.get('description').invalid && (form.get('description').touched || form.get('description').dirty) ">
            <ion-label color="danger" *ngIf="form.get('description')">
              Enter the description. Must be greater than 8 characters
            </ion-label>
          </ion-item>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col size-sm="6" offset-sm="3">
          <ion-item>
            <ion-label position="floating"> Select the Product Category <span class="required-field"></span></ion-label>
            <ion-select formControlName="productCategoryId" interface="alert" multiple="true">
              <ion-select-option *ngFor="let pc of productCategoryList" value={{pc.id}}>
                {{pc.name}}
              </ion-select-option>
            </ion-select>
          </ion-item>
          <ion-item lines="none"
            *ngIf="form.get('productCategoryId').invalid && (form.get('productCategoryId').dirty || form.get('productCategoryId').touched) ">
            <ion-label color="danger">
              Select the Product Category
            </ion-label>
          </ion-item>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col size-sm="3" offset-sm="3">
          <ion-button expand="block" color="primary" (click)="onClick()">
            <ion-label color="light"> {{displayButtonText}}</ion-label>
          </ion-button>
        </ion-col>
        <ion-col size-sm="3">
          <ion-button expand="block" color="danger" (click)="onCancel()">
            <ion-label color="light"> Cancel</ion-label>
          </ion-button>
        </ion-col>
      </ion-row>


    </ion-grid>
  </form>
</ion-content>
